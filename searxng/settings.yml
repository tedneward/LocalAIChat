use_default_settings: true

general:
  instance_name: local-searxng

server:
  port: 8080
  bind_address: 0.0.0.0
  secret_key: secretkey

search:
  safe_search: 0
  formats:
    - html
    - json

engines:

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg

  - name: brave
    engine: brave
    shortcut: br
    disabled: false

  - name: wikipedia
    engine: wikipedia
    shortcut: wp

  - name: wikidata
    engine: wikidata
    shortcut: wd

  - name: github
    engine: github
    shortcut: gh

  - name: stackoverflow
    engine: stackoverflow
    shortcut: so

